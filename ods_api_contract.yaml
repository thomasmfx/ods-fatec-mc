openapi: 3.0.3

info:
  title: ODS Mogi das Cruzes — API
  description: >
    API do sistema de votação da 1ª Conferência Nacional ODS — Etapa Livre,
    realizada na Fatec Mogi das Cruzes nos dias 28/03 e 04/04/2026.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Desenvolvimento local
  - url: https://api.ods-mogi.railway.app
    description: Produção (Railway)

tags:
  - name: Sessão
    description: Check-in e cadastro de participantes
  - name: Votação
    description: Registro de votos por eixo
  - name: Conteúdo
    description: Eixos e propostas disponíveis para votação
  - name: Dashboard
    description: Resultados em tempo real

# ─────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────
paths:

  # ── SESSÃO ──────────────────────────────────

  /sessao/checkin:
    post:
      tags: [Sessão]
      summary: Check-in de participante pré-cadastrado
      description: >
        Busca o participante pelo e-mail no banco. Retorna os dados do participante
        se encontrado, para confirmação antes de redirecionar à votação.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: carlos.mendes@email.com
      responses:
        '200':
          description: Participante encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  participante:
                    $ref: '#/components/schemas/ParticipanteResumo'
                  sessaoToken:
                    type: string
                    description: Token de sessão para uso nas próximas requisições
                    example: eyJhbGciOiJIUzI1NiJ9...
        '404':
          description: Participante não encontrado — redirecionar para cadastro
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example:
                erro: participante_nao_encontrado
                mensagem: Nenhum participante encontrado com este e-mail.
        '429':
          $ref: '#/components/responses/RateLimit'

  /sessao/cadastro:
    post:
      tags: [Sessão]
      summary: Cadastro completo de novo participante
      description: >
        Registra um novo participante no banco. Retorna o token de sessão
        para seguir direto para a votação.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CadastroInput'
            example:
              nome: Maria Silva
              email: maria.silva@email.com
              telefone: "11999998888"
              dataConferencia: "2026-03-28"
              identidadeGeneroId: 3
              orientacaoSexualId: 1
              racaCorId: 1
              cidadeId: 1
              regiaoId: 1
              pertenceCadeiaProdutiva: false
              cadeiasProdutivosIds: []
              instituicaoId: 1
              instituicaoOutro: null
              areasFormacaoIds: [2]
              ocupacao: Professora
              publicosFatecIds: [3]
              tipoParticipanteId: 1
              possuiDeficiencia: false
              deficienciasIds: []
              recursoAcessibilidade: null
              eixosInteresseIds: [1, 2]
              autorizacaoImagem: true
      responses:
        '201':
          description: Participante cadastrado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  participante:
                    $ref: '#/components/schemas/ParticipanteResumo'
                  sessaoToken:
                    type: string
                    example: eyJhbGciOiJIUzI1NiJ9...
        '409':
          description: E-mail já cadastrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example:
                erro: email_duplicado
                mensagem: Este e-mail já está cadastrado. Faça check-in.
        '422':
          $ref: '#/components/responses/ValidacaoError'
        '429':
          $ref: '#/components/responses/RateLimit'

  /sessao/nova:
    post:
      tags: [Sessão]
      summary: Encerra a sessão atual (instrutor)
      description: >
        Invalida o token de sessão atual. Chamado pelo instrutor ao clicar
        em "Nova sessão" na tela de confirmação.
      security:
        - sessaoToken: []
      responses:
        '200':
          description: Sessão encerrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensagem:
                    type: string
                    example: Sessão encerrada com sucesso.
        '401':
          $ref: '#/components/responses/NaoAutorizado'

  # ── VOTAÇÃO ─────────────────────────────────

  /votacao:
    post:
      tags: [Votação]
      summary: Registra os votos e envia o certificado
      description: >
        Recebe os votos de todos os 4 eixos de uma vez, persiste no banco,
        gera o certificado PDF e envia por e-mail. Chamado ao confirmar
        o e-mail no modal de revisão.
      security:
        - sessaoToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [votos]
              properties:
                votos:
                  type: array
                  minItems: 4
                  maxItems: 4
                  items:
                    type: object
                    required: [eixoId, propostaId]
                    properties:
                      eixoId:
                        type: integer
                      propostaId:
                        type: integer
            example:
              votos:
                - eixoId: 1
                  propostaId: 1
                - eixoId: 2
                  propostaId: 3
                - eixoId: 4
                  propostaId: 7
                - eixoId: 5
                  propostaId: 9
      responses:
        '200':
          description: Votos registrados e certificado enviado
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensagem:
                    type: string
                    example: Votação concluída. Certificado enviado para maria.silva@email.com.
                  emailEnviadoPara:
                    type: string
                    format: email
                    example: maria.silva@email.com
        '400':
          description: Votos incompletos ou eixo duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example:
                erro: votos_invalidos
                mensagem: É necessário votar em exatamente 1 proposta por eixo.
        '409':
          description: Participante já votou
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example:
                erro: voto_duplicado
                mensagem: Este participante já registrou votos nesta conferência.
        '401':
          $ref: '#/components/responses/NaoAutorizado'
        '429':
          $ref: '#/components/responses/RateLimit'

  # ── CONTEÚDO ────────────────────────────────

  /eixos:
    get:
      tags: [Conteúdo]
      summary: Lista todos os eixos com suas propostas
      description: >
        Retorna os 4 eixos ODS com todas as propostas vinculadas.
        Usado pela tela de votação para montar as opções.
      responses:
        '200':
          description: Lista de eixos com propostas
          content:
            application/json:
              schema:
                type: object
                properties:
                  eixos:
                    type: array
                    items:
                      $ref: '#/components/schemas/Eixo'
              example:
                eixos:
                  - id: 1
                    nome: Eixo 1
                    descricao: Democracia e instituições fortes
                    propostas:
                      - id: 1
                        titulo: Fortalecimento das instituições democráticas
                        descricao: Criação de mecanismos de transparência e controle social nas instituições públicas municipais.
                      - id: 2
                        titulo: Participação cidadã nos processos decisórios
                        descricao: Implementação de plataformas digitais para consulta pública e engajamento da sociedade.
                  - id: 2
                    nome: Eixo 2
                    descricao: Sustentabilidade ambiental
                    propostas:
                      - id: 3
                        titulo: Redução de resíduos sólidos urbanos
                        descricao: Programa de compostagem e coleta seletiva em bairros da cidade com metas anuais.
                      - id: 4
                        titulo: Arborização urbana e corredores verdes
                        descricao: Plantio de espécies nativas em vias públicas e criação de corredores ecológicos urbanos.
                  - id: 3
                    nome: Eixo 4
                    descricao: Inovação tecnológica para o desenvolvimento sustentável
                    propostas:
                      - id: 7
                        titulo: Incentivo à inovação em startups locais
                        descricao: Criação de hub de inovação com suporte técnico e financeiro para empreendedores locais.
                      - id: 8
                        titulo: Capacitação digital para trabalhadores
                        descricao: Programa de letramento digital para trabalhadores de setores tradicionais em transição.
                  - id: 4
                    nome: Eixo 5
                    descricao: Governança participativa
                    propostas:
                      - id: 9
                        titulo: Orçamento participativo digital
                        descricao: Plataforma de votação online para alocação de parte do orçamento municipal pelos cidadãos.
                      - id: 10
                        titulo: Conselhos municipais fortalecidos
                        descricao: Revisão das estruturas dos conselhos municipais para maior representatividade deliberativa.

  # ── DASHBOARD ───────────────────────────────

  /dashboard:
    get:
      tags: [Dashboard]
      summary: Resultados em tempo real
      description: >
        Retorna o total de participantes, total de votos, e a contagem
        de votos por proposta agrupada por eixo.
      responses:
        '200':
          description: Dados do dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardData'
              example:
                totalParticipantes: 10
                totalVotos: 20
                eixos:
                  - id: 1
                    nome: Eixo 1
                    propostas:
                      - id: 1
                        titulo: Fortalecimento das instituições democráticas
                        votos: 3
                      - id: 2
                        titulo: Participação cidadã nos processos decisórios
                        votos: 2
                  - id: 2
                    nome: Eixo 2
                    propostas:
                      - id: 3
                        titulo: Redução de resíduos sólidos urbanos
                        votos: 4
                      - id: 4
                        titulo: Arborização urbana e corredores verdes
                        votos: 1
                  - id: 3
                    nome: Eixo 4
                    propostas:
                      - id: 7
                        titulo: Incentivo à inovação em startups locais
                        votos: 4
                      - id: 8
                        titulo: Capacitação digital para trabalhadores
                        votos: 2
                  - id: 4
                    nome: Eixo 5
                    propostas:
                      - id: 9
                        titulo: Orçamento participativo digital
                        votos: 2
                      - id: 10
                        titulo: Conselhos municipais fortalecidos
                        votos: 2

# ─────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────
components:

  securitySchemes:
    sessaoToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token retornado no check-in ou cadastro. Enviado no header Authorization.

  responses:
    NaoAutorizado:
      description: Token de sessão ausente ou inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erro'
          example:
            erro: nao_autorizado
            mensagem: Token de sessão inválido ou expirado.

    RateLimit:
      description: Muitas requisições — rate limit atingido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erro'
          example:
            erro: rate_limit
            mensagem: Muitas requisições. Aguarde alguns segundos.

    ValidacaoError:
      description: Dados inválidos ou campos obrigatórios ausentes
      content:
        application/json:
          schema:
            type: object
            properties:
              erro:
                type: string
                example: validacao
              campos:
                type: array
                items:
                  type: object
                  properties:
                    campo:
                      type: string
                    mensagem:
                      type: string
                example:
                  - campo: email
                    mensagem: E-mail inválido.
                  - campo: nome
                    mensagem: Nome completo é obrigatório.

  schemas:

    Erro:
      type: object
      properties:
        erro:
          type: string
        mensagem:
          type: string

    ParticipanteResumo:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: Carlos Eduardo Mendes
        email:
          type: string
          format: email
          example: carlos.mendes@email.com
        tipoParticipante:
          type: string
          example: Presencial

    CadastroInput:
      type: object
      required:
        - nome
        - email
        - telefone
        - dataConferencia
        - identidadeGeneroId
        - orientacaoSexualId
        - racaCorId
        - cidadeId
        - regiaoId
        - ocupacao
        - tipoParticipanteId
        - areasFormacaoIds
        - eixosInteresseIds
        - autorizacaoImagem
      properties:
        nome:
          type: string
          example: Maria Silva
        email:
          type: string
          format: email
          example: maria.silva@email.com
        telefone:
          type: string
          pattern: '^\d{11}$'
          example: "11999998888"
        dataConferencia:
          type: string
          format: date
          enum: ["2026-03-28", "2026-04-04"]
          example: "2026-03-28"
        identidadeGeneroId:
          type: integer
          example: 3
        orientacaoSexualId:
          type: integer
          example: 1
        racaCorId:
          type: integer
          example: 1
        cidadeId:
          type: integer
          example: 1
        regiaoId:
          type: integer
          example: 1
        pertenceCadeiaProdutiva:
          type: boolean
          example: false
        cadeiasProdutivosIds:
          type: array
          items:
            type: integer
          example: []
        instituicaoId:
          type: integer
          example: 1
        instituicaoOutro:
          type: string
          nullable: true
          example: null
        areasFormacaoIds:
          type: array
          items:
            type: integer
          example: [2]
        ocupacao:
          type: string
          example: Professora
        publicosFatecIds:
          type: array
          items:
            type: integer
          description: Opcional — só preencher se tiver vínculo com a Fatec
          example: [3]
        tipoParticipanteId:
          type: integer
          example: 1
        possuiDeficiencia:
          type: boolean
          example: false
        deficienciasIds:
          type: array
          items:
            type: integer
          example: []
        recursoAcessibilidade:
          type: string
          nullable: true
          example: null
        eixosInteresseIds:
          type: array
          items:
            type: integer
          example: [1, 2]
        autorizacaoImagem:
          type: boolean
          enum: [true]
          example: true

    Eixo:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        descricao:
          type: string
        propostas:
          type: array
          items:
            $ref: '#/components/schemas/Proposta'

    Proposta:
      type: object
      properties:
        id:
          type: integer
        titulo:
          type: string
        descricao:
          type: string

    DashboardData:
      type: object
      properties:
        totalParticipantes:
          type: integer
        totalVotos:
          type: integer
        eixos:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              nome:
                type: string
              propostas:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    titulo:
                      type: string
                    votos:
                      type: integer